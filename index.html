<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ATLAS SNACK</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
/* نفس الـ CSS السابق بدون تغيير */
:root{--bg:#0c0a08;--dark:#141210;--card:#1c1916;--border:#2a2520;--red:#e63946;--gold:#f4a261;--gold2:#ffd166;--white:#f8f4f0;--gray:#8a8078}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;-moz-user-select:none;user-select:none;-webkit-touch-callout:none}
input{-webkit-user-select:text;user-select:text}
html{scroll-behavior:smooth}
body{font-family:'Cairo',sans-serif;background:var(--bg);color:var(--white);overflow-x:hidden}
/* ... باقي الـ CSS كما هو ... */
</style>
</head>
<body>

<!-- باقي الأقسام العلوية كما هي (nav, hero, mq, ... ) -->

<section class="menu-sec" id="menu">
  <div class="eyebrow"><div class="eline"></div><div class="etxt">✦ قائمة الطعام</div></div>
  <h2 class="stitle">اختر <span>طلبك</span></h2>
  <div class="items">

    <!-- برغر -->
    <div class="icard">
      <div class="iico">
        <img src="burger.jpeg.JPG" alt="برغر" onerror="this.replaceWith(document.createTextNode('🍔'))">
      </div>
      <div class="ibody">
        <div class="ibadges"><span class="badge bb">◈ الأفضل</span></div>
        <div class="iname">برغر أطلس الكبير</div>
        <div class="idesc">لحمة بقري 200غ + جبن شيدر + خس + طماطم + صوص خاص</div>
        <div class="ifoot">
          <div class="iprice">55 <em>درهم</em></div>
          <div class="ictrl">
            <button class="btn-minus" onclick="removeItem('برغر أطلس الكبير')">−</button>
            <span class="iqn" id="q0">0</span>
            <button class="btn-plus" onclick="addItem('برغر أطلس الكبير',55,'🍔','q0')">+</button>
          </div>
        </div>
      </div>
    </div>

    <!-- تاكوس -->
    <div class="icard">
      <div class="iico">
        <img src="tacos.jpeg.JPG" alt="تاكوس" onerror="this.replaceWith(document.createTextNode('🌮'))">
      </div>
      <div class="ibody">
        <div class="ibadges"><span class="badge bn">✦ جديد</span></div>
        <div class="iname">تاكوس أطلس</div>
        <div class="idesc">ورق تاكوس + لحم + فريت + صوص algerien + جبن</div>
        <div class="ifoot">
          <div class="iprice">38 <em>درهم</em></div>
          <div class="ictrl">
            <button class="btn-minus" onclick="removeItem('تاكوس أطلس')">−</button>
            <span class="iqn" id="q1">0</span>
            <button class="btn-plus" onclick="addItem('تاكوس أطلس',38,'🌮','q1')">+</button>
          </div>
        </div>
      </div>
    </div>

    <!-- فريت -->
    <div class="icard">
      <div class="iico">
        <img src="frites.jpeg.JPG" alt="فريت" onerror="this.replaceWith(document.createTextNode('🍟'))">
      </div>
      <div class="ibody">
        <div class="ibadges"></div>
        <div class="iname">فريت كبير</div>
        <div class="idesc">بطاطس مقلية طازجة مع كاتشب أو مايونيز</div>
        <div class="ifoot">
          <div class="iprice">18 <em>درهم</em></div>
          <div class="ictrl">
            <button class="btn-minus" onclick="removeItem('فريت كبير')">−</button>
            <span class="iqn" id="q2">0</span>
            <button class="btn-plus" onclick="addItem('فريت كبير',18,'🍟','q2')">+</button>
          </div>
        </div>
      </div>
    </div>

    <!-- كوكا -->
    <div class="icard">
      <div class="iico">
        <img src="coca.jpeg.JPG" alt="كوكا" onerror="this.replaceWith(document.createTextNode('🥤'))">
      </div>
      <div class="ibody">
        <div class="ibadges"></div>
        <div class="iname">كوكا / فانتا / سبرايت</div>
        <div class="idesc">علبة 33cl مبردة</div>
        <div class="ifoot">
          <div class="iprice">12 <em>درهم</em></div>
          <div class="ictrl">
            <button class="btn-minus" onclick="removeItem('كوكا / فانتا / سبرايت')">−</button>
            <span class="iqn" id="q3">0</span>
            <button class="btn-plus" onclick="addItem('كوكا / فانتا / سبرايت',12,'🥤','q3')">+</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</section>

<!-- باقي الأقسام (info-sec, footer, الأزرار الطافية, الـ drawer, الـ modal, ... ) تبقى كما هي -->

var dtype = 'od';
var dlabels = {od:'توصيل للمنزل 🛵', op:'استلام من المحل ◈', odi:'أكل في المحل 🍽️'};

</script>
</body>
</html>
